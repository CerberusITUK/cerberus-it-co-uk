name: Deploy to 20i

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare SSH key
        env:
          DEPLOY_KEY: ${{ secrets.TWENTYI_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/20i_deploy
          chmod 600 ~/.ssh/20i_deploy

      - name: Pull latest code on 20i
        env:
          SSH_HOST: ${{ secrets.TWENTYI_SSH_HOST }}
          SSH_USER: ${{ secrets.TWENTYI_SSH_USER }}
          REMOTE_PATH: ${{ secrets.TWENTYI_REMOTE_PATH }}
        run: |
          ssh -i ~/.ssh/20i_deploy \
            -o StrictHostKeyChecking=no \
            "$SSH_USER@$SSH_HOST" <<'EOF'
            set -e
            cd "$REMOTE_PATH"
            git pull origin main
          EOF

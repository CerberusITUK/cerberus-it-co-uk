<!DOCTYPE html>
<html lang="en">
<head>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-50 p-6 md:p-12">

  <div class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-4 gap-4 auto-rows-[200px]">
    
    <div class="md:col-span-2 md:row-span-2 bg-white rounded-3xl p-8 shadow-sm border border-slate-200 flex flex-col justify-between overflow-hidden relative">
      <div>
        <h3 class="text-2xl font-bold tracking-tight mb-2">Create and sell</h3>
        <p class="text-slate-500 max-w-[200px]">Manage your business with ease.</p>
      </div>
      <div class="absolute -bottom-10 -right-10 w-64 h-64 bg-slate-100 rounded-full"></div>
    </div>

    <div class="md:row-span-2 bg-slate-900 text-white rounded-3xl p-8 flex flex-col justify-between overflow-hidden">
      <h3 class="text-2xl font-semibold">Smart Insights</h3>
      <div class="mt-4 h-full bg-slate-800 rounded-2xl border border-slate-700 p-4">
        <div class="w-full h-full flex items-end gap-2">
            <div class="w-full bg-blue-500 h-[40%] rounded-t-sm"></div>
            <div class="w-full bg-blue-400 h-[70%] rounded-t-sm"></div>
            <div class="w-full bg-blue-600 h-[55%] rounded-t-sm"></div>
        </div>
      </div>
    </div>

    <div class="bg-indigo-600 text-white rounded-3xl p-6 flex flex-col justify-center items-center text-center">
      <p class="text-3xl font-bold">15k+</p>
      <p class="text-indigo-200 text-sm">Active Users</p>
    </div>

    <div class="bg-white border border-slate-200 rounded-3xl p-6 flex items-center gap-4">
      <div class="w-12 h-12 bg-indigo-100 rounded-xl flex items-center justify-center text-indigo-600">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
        </svg>
      </div>
      <div>
        <p class="font-bold">Fast Delivery</p>
        <p class="text-xs text-slate-400">Under 24 hours</p>
      </div>
    </div>

    <div class="md:col-span-2 bg-white border border-slate-200 rounded-3xl p-8 flex items-center justify-between overflow-hidden">
      <div>
        <h3 class="text-xl font-bold">Collaborate instantly</h3>
        <p class="text-slate-500 text-sm">Work together from anywhere in the world.</p>
      </div>
      <div class="flex -space-x-3">
        <div class="w-10 h-10 rounded-full border-2 border-white bg-slate-200"></div>
        <div class="w-10 h-10 rounded-full border-2 border-white bg-slate-300"></div>
        <div class="w-10 h-10 rounded-full border-2 border-white bg-slate-400"></div>
      </div>
    </div>

  </div>
</body>
</html>
